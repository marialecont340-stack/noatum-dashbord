<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Capacitación — Noatum</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      color: #fff;
      background-color: #0a0f1e;
    }

    /* ══ FONDO — solo desktop ══ */
    @media (min-width: 900px) {
      body {
        background-image: url('noatum-bgk.png');
        background-size: cover;
        background-position: center top;
        background-repeat: no-repeat;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: rgba(5, 12, 35, 0.52);
        z-index: 0;
      }
    }

    /* ══ CONTENEDOR ══ */
    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem 1rem 2rem;
    }

    /* Desktop: empuja contenido al interior del tablero */
    @media (min-width: 900px) {
      .page { padding-top: 10vh; width: 68%; }
    }

    /* ══ HEADER ══ */
    header {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.75rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }
    .header-brand { display: flex; align-items: center; gap: 10px; }
    .brand-bar {
      width: 4px; height: 36px;
      background: #C8102E;
      border-radius: 3px; flex-shrink: 0;
    }
    .brand-text { display: flex; align-items: center; flex-wrap: wrap; gap: 0; }
    .brand-text span {
      font-size: clamp(1rem, 2.8vw, 1.45rem);
      font-weight: 800; line-height: 1; letter-spacing: 0.06em;
    }
    .brand-sep {
      color: #C8102E;
      font-size: clamp(1rem, 2.8vw, 1.45rem);
      font-weight: 300; margin: 0 6px;
    }
    .brand-dark { color: #fff; }
    .brand-red  { color: #C8102E; }

    /* ══ GRID ══ */
    .scenarios-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 700px) {
      .scenarios-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
    }

    /* ══ TARJETA ══ */
    .scenario-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 14px;
      overflow: hidden;
      backdrop-filter: blur(8px);
      display: flex; flex-direction: column;
    }
    .scenario-header {
      padding: 0.45rem 1rem 0.4rem;
      border-bottom: 2px solid rgba(255,255,255,0.1);
      background: linear-gradient(135deg, rgba(200,16,46,0.92), rgba(200,16,46,0.68));
      text-align: center;
    }
    .scenario-header .tag {
      font-size: 0.58rem; font-weight: 800;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: rgba(255,255,255,0.65); margin-bottom: 1px;
    }
    .scenario-header h2 {
      font-size: clamp(0.9rem, 2vw, 1rem);
      font-weight: 700; color: #fff;
    }

    /* ══ CHART ══ */
    .chart-area {
      padding: 0.4rem 0.75rem 0.1rem;
      position: relative; height: 90px;
    }
    @media (min-width: 900px) {
      .chart-area { height: 95px; }
      .scenario-header h2 { font-size: 1.1rem; }
      .pill { font-size: 0.74rem; padding: 3px 9px; }
      .insight-box p { font-size: 0.74rem; line-height: 1.45; }
      .mayoria-badge { font-size: 0.72rem; margin: 0 0.7rem 0.4rem; }
    }

    /* ══ PILLS ══ */
    .vote-pills {
      display: flex; gap: 4px;
      padding: 0.3rem 0.7rem 0.3rem;
      flex-wrap: wrap;
    }
    .pill {
      display: flex; align-items: center; gap: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 20px; padding: 2px 8px;
      font-size: 0.68rem; font-weight: 500;
    }
    .pill .dot { width: 7px; height: 7px; border-radius: 50%; }
    .dot-a { background: #60a5fa; }
    .dot-b { background: #4ade80; }
    .dot-c { background: #fb923c; }
    .pill .pct { color: rgba(255,255,255,0.55); font-size: 0.65rem; margin-left: 1px; }

    /* ══ MAYORÍA ══ */
    .mayoria-badge {
      margin: 0 0.7rem 0.3rem;
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.65rem; font-weight: 700;
      color: #fde68a; text-transform: uppercase; letter-spacing: 0.05em;
    }

    /* ══ INSIGHT ══ */
    .insight-box {
      margin: 0 0.7rem 0.6rem;
      background: rgba(255,255,255,0.05);
      border-left: 3px solid #60a5fa;
      border-radius: 0 8px 8px 0;
      padding: 0.35rem 0.6rem; flex: 1;
    }
    .insight-box .insight-lbl {
      font-size: 0.58rem; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
      color: #93c5fd; margin-bottom: 2px;
    }
    .insight-box p {
      font-size: 0.68rem; line-height: 1.4;
      color: rgba(255,255,255,0.85);
    }

    /* ══ MOBILE: tarjeta horizontal ══ */
    @media (max-width: 699px) {
      .chart-area { height: 100px; }
      .insight-box p { font-size: 0.78rem; line-height: 1.5; }
      .pill { font-size: 0.75rem; padding: 3px 10px; }
      .scenario-header h2 { font-size: 1.1rem; }
    }

    .status-msg {
      text-align: center; padding: 2rem;
      color: rgba(255,255,255,0.5); font-size: 0.9rem;
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <div class="header-brand">
      <div class="brand-bar"></div>
      <div class="brand-text">
        <span class="brand-dark">RESULTADOS</span>
        <span class="brand-sep">|</span>
        <span class="brand-red">SIMULACIÓN</span>
        <span class="brand-sep">|</span>
        <span class="brand-dark">NOATUM</span>
      </div>
      <div class="brand-bar"></div>
    </div>
  </header>

  <div class="scenarios-grid" id="scenarios-grid">
    <div class="status-msg" id="loading-msg">⏳ Conectando...</div>
  </div>

</div>
<script>
  const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRmhc7rMhHxWRxlPvExnYe8-bgixqsq71eK3q_AbK1iQl3_rGwFa5Tta_cjbA96zB65FNly0bRFmFOQ/pub?gid=2001144107&single=true&output=csv';
  const REFRESH_MS = 30000;
  const charts = {};

  const INSIGHTS = {
    1: {
      A: '⚠️ La mayoría priorizó recuperar el tiempo operacional aun con controles incompletos. Esto refleja cómo la presión por cumplir puede desplazar decisiones preventivas y normalizar riesgos temporales dentro de la operación.',
      B: '✅ La mayoría priorizó asegurar completamente el área antes de continuar la maniobra. Esto refleja una cultura preventiva donde la intervención oportuna logra mantenerse incluso bajo presión operacional.',
      C: '⚠️ La mayoría optó por una solución intermedia para mantener la continuidad operacional mientras se completaban los controles. Esto evidencia cómo, bajo presión, las operaciones tienden a negociar parcialmente el riesgo.'
    },
    2: {
      A: '⚠️ La mayoría confió en la experiencia del equipo para continuar la maniobra aun con personal expuesto en la línea de operación. Esto refleja cómo la costumbre y la confianza operacional pueden disminuir la percepción real del riesgo.',
      B: '✅ La mayoría priorizó intervenir antes de continuar la maniobra. Esto refleja una cultura preventiva donde la experiencia no reemplaza los controles ni la percepción activa del riesgo.',
      C: '⚠️ La mayoría decidió permitir continuar la maniobra para evitar afectar la continuidad operacional. Esto evidencia cómo, bajo rutinas conocidas, el riesgo puede empezar a normalizarse sin generar intervención inmediata.'
    },
    3: {
      A: '⚠️ La mayoría priorizó continuar la operación debido al nivel jerárquico de la solicitud. Esto refleja cómo la presión operacional y la autoridad pueden influir en el cumplimiento de controles preventivos.',
      B: '✅ La mayoría priorizó mantener el estándar preventivo antes de iniciar la maniobra. Esto refleja una cultura donde los procedimientos se sostienen incluso bajo presión operacional o solicitudes jerárquicas.',
      C: '⚠️ La mayoría optó por avanzar parcialmente para mantener la continuidad operacional mientras se completaban los controles pendientes. Esto evidencia cómo, bajo presión jerárquica, las operaciones tienden a flexibilizar temporalmente los estándares preventivos.'
    }
  };

  function parseCSV(text) {
    const rows = [];
    for (const line of text.split('\n')) {
      if (!line.trim()) continue;
      const cols = []; let inQ = false, col = '';
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { cols.push(col.trim()); col = ''; }
        else { col += ch; }
      }
      cols.push(col.trim());
      rows.push(cols);
    }
    return rows;
  }

  function renderChart(id, a, b, c) {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    if (charts[id]) { charts[id].destroy(); delete charts[id]; }
    charts[id] = new Chart(canvas.getContext('2d'), {
      type: 'bar',
      data: {
        labels: ['Opción A', 'Opción B', 'Opción C'],
        datasets: [{
          data: [a, b, c],
          backgroundColor: ['rgba(96,165,250,0.8)','rgba(74,222,128,0.8)','rgba(251,146,60,0.8)'],
          borderColor: ['#60a5fa','#4ade80','#fb923c'],
          borderWidth: 1.5, borderRadius: 4
        }]
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ` ${c.raw} votos` } } },
        scales: {
          x: { ticks: { color: 'rgba(255,255,255,0.45)', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.07)' }, beginAtZero: true },
          y: { ticks: { color: 'rgba(255,255,255,0.75)', font: { size: 10, weight: '600' } }, grid: { display: false } }
        }
      }
    });
  }

  function renderScenarios(scenData) {
    const grid = document.getElementById('scenarios-grid');
    Object.keys(charts).forEach(id => { if (charts[id]) { charts[id].destroy(); delete charts[id]; } });
    grid.innerHTML = '';
    scenData.forEach(({ idx, vA, vB, vC, total, mayoria }) => {
      const pct = v => total ? Math.round(v/total*100)+'%' : '0%';
      const insight = INSIGHTS[idx][mayoria] || '';
      const chartId = `chart-${idx}`;
      const card = document.createElement('div');
      card.className = 'scenario-card';
      card.innerHTML = `
        <div class="scenario-header">
          <div class="tag">Escenario ${idx}</div>
          <h2>Escenario ${idx}</h2>
        </div>
        <div class="chart-area">
          <canvas id="${chartId}" role="img" aria-label="Votos escenario ${idx}"></canvas>
        </div>
        <div class="vote-pills">
          <span class="pill"><span class="dot dot-a"></span>A — ${vA} <span class="pct">(${pct(vA)})</span></span>
          <span class="pill"><span class="dot dot-b"></span>B — ${vB} <span class="pct">(${pct(vB)})</span></span>
          <span class="pill"><span class="dot dot-c"></span>C — ${vC} <span class="pct">(${pct(vC)})</span></span>
        </div>
        <div class="mayoria-badge">🏆 Mayoría: Opción ${mayoria}</div>
        <div class="insight-box">
          <div class="insight-lbl">💡 Insight</div>
          <p>${insight}</p>
        </div>`;
      grid.appendChild(card);
      renderChart(chartId, vA, vB, vC);
    });
  }

  function calcFromHoja1(rows) {
    const data = rows.slice(1).filter(r => r[5] && r[5].trim() === 'Finalizado');
    const scenData = [1,2,3].map(idx => {
      const col = 5 + idx;
      const vA = data.filter(r => r[col] && r[col].trim().toUpperCase() === 'A').length;
      const vB = data.filter(r => r[col] && r[col].trim().toUpperCase() === 'B').length;
      const vC = data.filter(r => r[col] && r[col].trim().toUpperCase() === 'C').length;
      const total = vA + vB + vC;
      let mayoria = 'A';
      if (vB >= vA && vB >= vC) mayoria = 'B';
      else if (vC > vA && vC > vB) mayoria = 'C';
      return { idx, vA, vB, vC, total, mayoria };
    });
    return scenData;
  }

  async function loadData() {
    try {
      const res = await fetch(SHEET_URL + '&t=' + Date.now());
      const text = await res.text();
      const rows = parseCSV(text);
      renderScenarios(calcFromHoja1(rows));
    } catch(err) {
      const msg = document.getElementById('loading-msg');
      if (msg) msg.textContent = '❌ Error al conectar con Google Sheets.';
    }
  }

  loadData();
  setInterval(loadData, REFRESH_MS);
</script>
</body>
</html>
