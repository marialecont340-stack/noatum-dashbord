<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Capacitación — Noatum</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #0a0f1e;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* ══ CONTENEDOR IMAGEN ══ */
    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* La imagen llena la pantalla manteniendo proporciones */
    .scene-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    /* Overlay oscuro */
    .scene-overlay {
      position: absolute;
      inset: 0;
      background: rgba(5, 12, 35, 0.45);
    }

    /* ══ CONTENIDO — posicionado dentro del tablero ══
       Tablero en la imagen: ~12% desde izq, ~7% desde arriba,
       ancho ~76%, alto ~58%  */
    .page {
      position: absolute;
      top: 7%;
      left: 12%;
      width: 76%;
      height: 58%;
      z-index: 2;
      display: flex;
      flex-direction: column;
      padding: 1.2% 1.5%;
      overflow: hidden;
    }

    /* ══ HEADER ══ */
    header {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.8%;
      padding-bottom: 0.6%;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      flex-shrink: 0;
    }
    .header-brand { display: flex; align-items: center; gap: 0.8vw; }
    .brand-bar {
      width: 0.3vw; min-width: 3px; height: 3.5vh;
      background: #C8102E; border-radius: 3px;
    }
    .brand-text { display: flex; align-items: center; }
    .brand-text span {
      font-size: clamp(0.7rem, 1.8vw, 1.4rem);
      font-weight: 800; letter-spacing: 0.06em;
    }
    .brand-sep {
      color: #C8102E;
      font-size: clamp(0.7rem, 1.8vw, 1.4rem);
      font-weight: 300; margin: 0 0.5vw;
    }
    .brand-dark { color: #fff; }
    .brand-red  { color: #C8102E; }

    /* ══ GRID ══ */
    .scenarios-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1%;
      flex: 1;
      min-height: 0;
    }

    /* ══ TARJETA ══ */
    .scenario-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 1vw;
      overflow: hidden;
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .scenario-header {
      padding: 0.5% 4%;
      border-bottom: 2px solid rgba(255,255,255,0.1);
      background: linear-gradient(135deg, rgba(200,16,46,0.92), rgba(200,16,46,0.7));
      text-align: center;
      flex-shrink: 0;
    }
    .scenario-header .tag {
      font-size: clamp(0.45rem, 0.9vw, 0.65rem);
      font-weight: 800; letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
    }
    .scenario-header h2 {
      font-size: clamp(0.7rem, 1.3vw, 1rem);
      font-weight: 700; color: #fff;
    }

    /* ══ CHART ══ */
    .chart-area {
      padding: 1% 3% 0%;
      position: relative;
      height: 22%;
      flex-shrink: 0;
    }

    /* ══ PILLS ══ */
    .vote-pills {
      display: flex; gap: 2%;
      padding: 1% 3% 1%;
      flex-wrap: wrap; flex-shrink: 0;
    }
    .pill {
      display: flex; align-items: center; gap: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 20px; padding: 1px 6px;
      font-size: clamp(0.45rem, 0.9vw, 0.7rem);
      font-weight: 500;
    }
    .pill .dot { width: 6px; height: 6px; border-radius: 50%; }
    .dot-a { background: #60a5fa; }
    .dot-b { background: #4ade80; }
    .dot-c { background: #fb923c; }
    .pill .pct { color: rgba(255,255,255,0.55); margin-left: 1px; }

    /* ══ MAYORÍA ══ */
    .mayoria-badge {
      padding: 0 3% 1%;
      font-size: clamp(0.45rem, 0.9vw, 0.7rem);
      font-weight: 700; color: #fde68a;
      text-transform: uppercase; letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    /* ══ INSIGHT ══ */
    .insight-box {
      margin: 0 3% 2%;
      background: rgba(255,255,255,0.05);
      border-left: 2px solid #60a5fa;
      border-radius: 0 6px 6px 0;
      padding: 1.5% 3%;
      flex: 1; overflow: hidden;
    }
    .insight-box .insight-lbl {
      font-size: clamp(0.4rem, 0.75vw, 0.6rem);
      font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; color: #93c5fd; margin-bottom: 1%;
    }
    .insight-box p {
      font-size: clamp(0.45rem, 0.85vw, 0.7rem);
      line-height: 1.4; color: rgba(255,255,255,0.85);
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .waiting-msg {
      margin: 3% auto;
      font-size: clamp(0.5rem, 1vw, 0.75rem);
      color: rgba(255,255,255,0.4);
      font-style: italic; text-align: center;
    }

    .status-msg {
      text-align: center; padding: 4%;
      color: rgba(255,255,255,0.5);
      font-size: clamp(0.6rem, 1.2vw, 0.9rem);
    }

    /* ══ MÓVIL — layout simple sin billboard ══ */
    @media (max-width: 700px) {
      html, body { overflow: auto; }
      .scene { height: auto; min-height: 100vh; align-items: flex-start; }
      .scene-img { display: none; }
      .scene-overlay { background: #0a0f1e; }
      .page {
        position: relative;
        top: auto; left: auto;
        width: 100%; height: auto;
        padding: 1rem;
      }
      .scenarios-grid { grid-template-columns: 1fr; gap: 12px; }
      .scenario-header h2 { font-size: 1.1rem; }
      .scenario-header .tag { font-size: 0.65rem; }
      .chart-area { height: 100px; padding: 0.5rem; }
      .pill { font-size: 0.75rem; padding: 3px 8px; }
      .pill .dot { width: 8px; height: 8px; }
      .mayoria-badge { font-size: 0.75rem; padding: 0 0.75rem 0.5rem; }
      .insight-box { margin: 0 0.75rem 0.75rem; padding: 0.5rem 0.75rem; }
      .insight-box p { font-size: 0.8rem; -webkit-line-clamp: unset; }
      .insight-box .insight-lbl { font-size: 0.65rem; }
      .brand-text span, .brand-sep { font-size: 1.1rem; }
      .brand-bar { height: 28px; width: 4px; }
      header { margin-bottom: 0.75rem; padding-bottom: 0.6rem; }
    }
  </style>
</head>
<body>
<div class="scene">
  <img class="scene-img" src="noatum-bgk.png" alt="background" />
  <div class="scene-overlay"></div>

  <div class="page">
    <header>
      <div class="header-brand">
        <div class="brand-bar"></div>
        <div class="brand-text">
          <span class="brand-dark">RESULTADOS</span>
          <span class="brand-sep">|</span>
          <span class="brand-red">SIMULACIÓN</span>
          <span class="brand-sep">|</span>
          <span class="brand-dark">NOATUM</span>
        </div>
        <div class="brand-bar"></div>
      </div>
    </header>

    <div class="scenarios-grid" id="scenarios-grid">
      <div class="status-msg" id="loading-msg">⏳ Conectando...</div>
    </div>
  </div>
</div>

<script>
  const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR6beUttk7b30ZQN5irmhdZf8Ag3coB0YBMdGmmuHJOYJv6EK7eNFNu9r0xFBxBysCZgfx_vzbNi0jS/pub?gid=628326535&single=true&output=csv';
  const REFRESH_MS = 30000;
  const charts = {};

  const INSIGHTS = {
    1: {
      A: '⚠️ La mayoría priorizó recuperar el tiempo operacional aun con controles incompletos. Esto refleja cómo la presión por cumplir puede desplazar decisiones preventivas y normalizar riesgos temporales dentro de la operación.',
      B: '✅ La mayoría priorizó asegurar completamente el área antes de continuar la maniobra. Esto refleja una cultura preventiva donde la intervención oportuna logra mantenerse incluso bajo presión operacional.',
      C: '⚠️ La mayoría optó por una solución intermedia para mantener la continuidad operacional mientras se completaban los controles. Esto evidencia cómo, bajo presión, las operaciones tienden a negociar parcialmente el riesgo.'
    },
    2: {
      A: '⚠️ La mayoría confió en la experiencia del equipo para continuar la maniobra aun con personal expuesto en la línea de operación. Esto refleja cómo la costumbre y la confianza operacional pueden disminuir la percepción real del riesgo.',
      B: '✅ La mayoría priorizó intervenir antes de continuar la maniobra. Esto refleja una cultura preventiva donde la experiencia no reemplaza los controles ni la percepción activa del riesgo.',
      C: '⚠️ La mayoría decidió permitir continuar la maniobra para evitar afectar la continuidad operacional. Esto evidencia cómo, bajo rutinas conocidas, el riesgo puede empezar a normalizarse sin generar intervención inmediata.'
    },
    3: {
      A: '⚠️ La mayoría priorizó continuar la operación debido al nivel jerárquico de la solicitud. Esto refleja cómo la presión operacional y la autoridad pueden influir en el cumplimiento de controles preventivos.',
      B: '✅ La mayoría priorizó mantener el estándar preventivo antes de iniciar la maniobra. Esto refleja una cultura donde los procedimientos se sostienen incluso bajo presión operacional o solicitudes jerárquicas.',
      C: '⚠️ La mayoría optó por avanzar parcialmente para mantener la continuidad operacional mientras se completaban los controles pendientes. Esto evidencia cómo, bajo presión jerárquica, las operaciones tienden a flexibilizar temporalmente los estándares preventivos.'
    }
  };

  function parseCSV(text) {
    const rows = [];
    for (const line of text.split('\n')) {
      if (!line.trim()) continue;
      const cols = []; let inQ = false, col = '';
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { cols.push(col.trim()); col = ''; }
        else { col += ch; }
      }
      cols.push(col.trim());
      rows.push(cols);
    }
    return rows;
  }

  function renderChart(id, a, b, c) {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    if (charts[id]) { charts[id].destroy(); delete charts[id]; }
    charts[id] = new Chart(canvas.getContext('2d'), {
      type: 'bar',
      data: {
        labels: ['Opción A', 'Opción B', 'Opción C'],
        datasets: [{
          data: [a, b, c],
          backgroundColor: ['rgba(96,165,250,0.8)','rgba(74,222,128,0.8)','rgba(251,146,60,0.8)'],
          borderColor: ['#60a5fa','#4ade80','#fb923c'],
          borderWidth: 1.5, borderRadius: 4
        }]
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ` ${c.raw} votos` } } },
        scales: {
          x: { ticks: { color: 'rgba(255,255,255,0.45)', font: { size: 9 } }, grid: { color: 'rgba(255,255,255,0.07)' }, beginAtZero: true },
          y: { ticks: { color: 'rgba(255,255,255,0.75)', font: { size: 9, weight: '600' } }, grid: { display: false } }
        }
      }
    });
  }

  function renderScenarios(scenData) {
    const grid = document.getElementById('scenarios-grid');
    Object.keys(charts).forEach(id => { if (charts[id]) { charts[id].destroy(); delete charts[id]; } });
    grid.innerHTML = '';
    scenData.forEach(({ idx, vA, vB, vC, total, mayoria }) => {
      const pct = v => total ? Math.round(v/total*100)+'%' : '0%';
      const insight = mayoria ? (INSIGHTS[idx][mayoria] || '') : null;
      const chartId = `chart-${idx}`;
      const card = document.createElement('div');
      card.className = 'scenario-card';
      card.innerHTML = `
        <div class="scenario-header">
          <div class="tag">Escenario ${idx}</div>
          <h2>Escenario ${idx}</h2>
        </div>
        <div class="chart-area">
          <canvas id="${chartId}" role="img" aria-label="Votos escenario ${idx}"></canvas>
        </div>
        <div class="vote-pills">
          <span class="pill"><span class="dot dot-a"></span>A — ${vA} <span class="pct">(${pct(vA)})</span></span>
          <span class="pill"><span class="dot dot-b"></span>B — ${vB} <span class="pct">(${pct(vB)})</span></span>
          <span class="pill"><span class="dot dot-c"></span>C — ${vC} <span class="pct">(${pct(vC)})</span></span>
        </div>
        ${mayoria
          ? `<div class="mayoria-badge">🏆 Mayoría: Opción ${mayoria}</div>
             <div class="insight-box">
               <div class="insight-lbl">💡 Insight</div>
               <p>${insight}</p>
             </div>`
          : `<div class="waiting-msg">⏳ Sin respuestas aún...</div>`
        }`;
      grid.appendChild(card);
      renderChart(chartId, vA, vB, vC);
    });
  }

  function calcFromHoja1(rows) {
    const data = rows.slice(1).filter(r => r[2] && r[3]);
    const scenData = [1, 2, 3].map(idx => {
      const filas = data.filter(r => {
        const esc = r[2].trim().replace('.0','').replace('Escenario ','').trim();
        return esc === String(idx);
      });
      const vA = filas.filter(r => r[3].trim().toUpperCase() === 'A').length;
      const vB = filas.filter(r => r[3].trim().toUpperCase() === 'B').length;
      const vC = filas.filter(r => r[3].trim().toUpperCase() === 'C').length;
      const total = vA + vB + vC;
      let mayoria = null;
      if (total > 0) {
        mayoria = 'A';
        if (vB >= vA && vB >= vC) mayoria = 'B';
        else if (vC > vA && vC > vB) mayoria = 'C';
      }
      return { idx, vA, vB, vC, total, mayoria };
    });
    return scenData;
  }

  async function loadData() {
    try {
      const res = await fetch(SHEET_URL + '&t=' + Date.now());
      const text = await res.text();
      renderScenarios(calcFromHoja1(parseCSV(text)));
    } catch(err) {
      const msg = document.getElementById('loading-msg');
      if (msg) msg.textContent = '❌ Error al conectar con Google Sheets.';
    }
  }

  loadData();
  setInterval(loadData, REFRESH_MS);
</script>
</body>
</html>
