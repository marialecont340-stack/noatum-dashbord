<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Capacitación — Noatum</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      color: #fff;
      background-color: #0a0f1e;
      background-image: url('noatum-bgk.png');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(5, 12, 35, 0.55);
      z-index: 0;
    }

    /* ── CONTENIDO — posicionado dentro del tablero ── */
    .page {
      position: absolute;
      z-index: 1;
      top: 3%;
      left: 50%;
      transform: translateX(-50%);
      width: 72%;
      max-height: 62vh;
      overflow-y: auto;
      padding: 1rem 1.75rem;
      scrollbar-width: none;
    }
    .page::-webkit-scrollbar { display: none; }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.85rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .brand-bar {
      width: 5px;
      height: 48px;
      background: #C8102E;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .brand-text {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 0;
    }
    .brand-text span {
      font-size: 1.6rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.06em;
    }
    .brand-sep {
      color: #C8102E;
      font-size: 1.6rem;
      font-weight: 300;
      margin: 0 10px;
    }
    .brand-dark { color: #fff; }
    .brand-red  { color: #C8102E; }
    .brand-underline { display: none; }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(34,197,94,0.15);
      border: 1px solid rgba(34,197,94,0.35);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.78rem;
      font-weight: 600;
      color: #4ade80;
      letter-spacing: 0.04em;
    }
    .live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.4; transform:scale(0.85); }
    }

    /* ── GRID DE ESCENARIOS ── */
    .scenarios-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    /* ── TARJETA DE ESCENARIO ── */
    .scenario-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 16px;
      overflow: hidden;
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
    }
    .scenario-header {
      padding: 0.75rem 1.25rem 0.65rem;
      border-bottom: 2px solid rgba(255,255,255,0.1);
      background: linear-gradient(135deg, rgba(200,16,46,0.9), rgba(200,16,46,0.65));
      text-align: center;
    }
    .scenario-header .tag {
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      margin-bottom: 2px;
    }
    .scenario-header h2 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.03em;
    }

    .chart-area {
      padding: 0.75rem 1rem 0.25rem;
      position: relative;
      height: 120px;
    }

    /* ── PILLS DE VOTOS ── */
    .vote-pills {
      display: flex;
      gap: 8px;
      padding: 0 1.25rem 1rem;
      flex-wrap: wrap;
    }
    .pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .pill .dot { width:9px; height:9px; border-radius:50%; }
    .dot-a { background:#60a5fa; }
    .dot-b { background:#4ade80; }
    .dot-c { background:#fb923c; }
    .pill .pct { color: rgba(255,255,255,0.55); font-size:0.73rem; margin-left:2px; }

    .mayoria-badge {
      margin: 0 1.25rem 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #fde68a;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .mayoria-badge span { font-size:1rem; }

    /* ── INSIGHT ── */
    .insight-box {
      margin: 0 1.25rem 1.25rem;
      background: rgba(255,255,255,0.05);
      border-left: 3px solid #60a5fa;
      border-radius: 0 10px 10px 0;
      padding: 0.8rem 1rem;
      flex: 1;
    }
    .insight-box .insight-lbl {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #93c5fd;
      margin-bottom: 5px;
    }
    .insight-box p {
      font-size: 0.82rem;
      line-height: 1.55;
      color: rgba(255,255,255,0.82);
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.25);
    }

    /* ── LOADING / ERROR ── */
    .status-msg {
      text-align: center;
      padding: 3rem;
      color: rgba(255,255,255,0.5);
      font-size: 0.95rem;
    }

    @media (max-width: 600px) {
      .header-left h1 { font-size: 1.15rem; }
      .scenarios-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- HEADER -->
  <header>
    <div class="header-brand">
      <div class="brand-bar"></div>
      <div class="brand-text">
        <span class="brand-dark">RESULTADOS</span>
        <span class="brand-sep">|</span>
        <span class="brand-red">SIMULACIÓN</span>
        <span class="brand-sep">|</span>
        <span class="brand-dark">NOATUM</span>
      </div>
      <div class="brand-bar"></div>
    </div>
  </header>

  <!-- ESCENARIOS -->
  <div class="scenarios-grid" id="scenarios-grid">
    <div class="status-msg" id="loading-msg">⏳ Conectando con Google Sheets...</div>
  </div>

  <footer id="footer-time"></footer>

</div>

<script>
  const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRmhc7rMhHxWRxlPvExnYe8-bgixqsq71eK3q_AbK1iQl3_rGwFa5Tta_cjbA96zB65FNly0bRFmFOQ/pub?gid=2001144107&single=true&output=csv';
  const REFRESH_MS = 30000;
  const charts = {};

  // ── Insights hardcodeados por escenario y opción ──
  const INSIGHTS = {
    1: {
      A: '⚠️ La mayoría priorizó recuperar el tiempo operacional aun con controles incompletos. Esto refleja cómo la presión por cumplir puede desplazar decisiones preventivas y normalizar riesgos temporales dentro de la operación.',
      B: '✅ La mayoría priorizó asegurar completamente el área antes de continuar la maniobra. Esto refleja una cultura preventiva donde la intervención oportuna logra mantenerse incluso bajo presión operacional.',
      C: '⚠️ La mayoría optó por una solución intermedia para mantener la continuidad operacional mientras se completaban los controles. Esto evidencia cómo, bajo presión, las operaciones tienden a negociar parcialmente el riesgo.'
    },
    2: {
      A: '⚠️ La mayoría confió en la experiencia del equipo para continuar la maniobra aun con personal expuesto en la línea de operación. Esto refleja cómo la costumbre y la confianza operacional pueden disminuir la percepción real del riesgo.',
      B: '✅ La mayoría priorizó intervenir antes de continuar la maniobra. Esto refleja una cultura preventiva donde la experiencia no reemplaza los controles ni la percepción activa del riesgo.',
      C: '⚠️ La mayoría decidió permitir continuar la maniobra para evitar afectar la continuidad operacional. Esto evidencia cómo, bajo rutinas conocidas, el riesgo puede empezar a normalizarse sin generar intervención inmediata.'
    },
    3: {
      A: '⚠️ La mayoría priorizó continuar la operación debido al nivel jerárquico de la solicitud. Esto refleja cómo la presión operacional y la autoridad pueden influir en el cumplimiento de controles preventivos.',
      B: '✅ La mayoría priorizó mantener el estándar preventivo antes de iniciar la maniobra. Esto refleja una cultura donde los procedimientos se sostienen incluso bajo presión operacional o solicitudes jerárquicas.',
      C: '⚠️ La mayoría optó por avanzar parcialmente para mantener la continuidad operacional mientras se completaban los controles pendientes. Esto evidencia cómo, bajo presión jerárquica, las operaciones tienden a flexibilizar temporalmente los estándares preventivos.'
    }
  };

  // ── Parser CSV robusto ──
  function parseCSV(text) {
    const rows = [];
    for (const line of text.split('\n')) {
      if (!line.trim()) continue;
      const cols = [];
      let inQ = false, col = '';
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { cols.push(col.trim()); col = ''; }
        else { col += ch; }
      }
      cols.push(col.trim());
      rows.push(cols);
    }
    return rows;
  }

  // ── Chart ──
  function renderChart(id, a, b, c) {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    if (charts[id]) {
      charts[id].data.datasets[0].data = [a, b, c];
      charts[id].update('active');
    } else {
      charts[id] = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['Opción A', 'Opción B', 'Opción C'],
          datasets: [{
            data: [a, b, c],
            backgroundColor: ['rgba(96,165,250,0.75)','rgba(74,222,128,0.75)','rgba(251,146,60,0.75)'],
            borderColor: ['#60a5fa','#4ade80','#fb923c'],
            borderWidth: 1.5, borderRadius: 5
          }]
        },
        options: {
          indexAxis: 'y', responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ` ${c.raw} votos` } } },
          scales: {
            x: { ticks: { color: 'rgba(255,255,255,0.45)', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.07)' }, beginAtZero: true },
            y: { ticks: { color: 'rgba(255,255,255,0.7)', font: { size: 12, weight: '600' } }, grid: { display: false } }
          }
        }
      });
    }
  }

  // ── Render tarjetas ──
  function renderScenarios(scenData) {
    const grid = document.getElementById('scenarios-grid');
    // Destruir charts existentes antes de limpiar el DOM
    Object.keys(charts).forEach(id => {
      if (charts[id]) { charts[id].destroy(); delete charts[id]; }
    });
    grid.innerHTML = '';
    scenData.forEach(({ idx, vA, vB, vC, total, mayoria }) => {
      const pA = total ? Math.round(vA/total*100)+'%' : '0%';
      const pB = total ? Math.round(vB/total*100)+'%' : '0%';
      const pC = total ? Math.round(vC/total*100)+'%' : '0%';
      const insight = INSIGHTS[idx][mayoria] || 'Insight pendiente...';
      const chartId = `chart-${idx}`;
      const card = document.createElement('div');
      card.className = 'scenario-card';
      card.innerHTML = `
        <div class="scenario-header">
          <div class="tag">Escenario ${idx}</div>
          <h2>Escenario ${idx}</h2>
        </div>
        <div class="chart-area">
          <canvas id="${chartId}" role="img" aria-label="Votos escenario ${idx}"></canvas>
        </div>
        <div class="vote-pills">
          <span class="pill"><span class="dot dot-a"></span>A — ${vA} votos <span class="pct">(${pA})</span></span>
          <span class="pill"><span class="dot dot-b"></span>B — ${vB} votos <span class="pct">(${pB})</span></span>
          <span class="pill"><span class="dot dot-c"></span>C — ${vC} votos <span class="pct">(${pC})</span></span>
        </div>
        <div class="mayoria-badge"><span>🏆</span> Mayoría: Opción ${mayoria}</div>
        <div class="insight-box">
          <div class="insight-lbl">💡 Insight</div>
          <p>${insight}</p>
        </div>`;
      grid.appendChild(card);
      renderChart(chartId, vA, vB, vC);
    });
  }

  // ── Cálculo desde Hoja1 ──
  function calcFromHoja1(rows) {
    // Saltar fila de encabezado
    const data = rows.slice(1).filter(r => r[5] && r[5].trim() === 'Finalizado');

    // col 6=E1, 7=E2, 8=E3
    const scenData = [1, 2, 3].map(idx => {
      const col = 5 + idx; // col 6,7,8 → índice 6,7,8
      const vA = data.filter(r => r[col] && r[col].trim().toUpperCase() === 'A').length;
      const vB = data.filter(r => r[col] && r[col].trim().toUpperCase() === 'B').length;
      const vC = data.filter(r => r[col] && r[col].trim().toUpperCase() === 'C').length;
      const total = vA + vB + vC;
      let mayoria = 'A';
      if (vB >= vA && vB >= vC) mayoria = 'B';
      else if (vC > vA && vC > vB) mayoria = 'C';
      return { idx, vA, vB, vC, total, mayoria };
    });

    return { scenData, totalPart: data.length };
  }

  // ── Fetch principal ──
  async function loadData() {
    try {
      const res  = await fetch(SHEET_URL + '&t=' + Date.now());
      const text = await res.text();
      const rows = parseCSV(text);

      const { scenData, totalPart } = calcFromHoja1(rows);

      if (!totalPart && scenData.every(s => s.total === 0)) {
        const msg = document.getElementById('loading-msg');
        if (msg) msg.textContent = '⏳ Sin respuestas aún. Esperando participantes...';
        return;
      }

      renderScenarios(scenData);

      const now = new Date();
      document.getElementById('footer-time').textContent =
        `${totalPart} participantes · Última actualización: ${now.toLocaleTimeString('es-PE')} · Refresco cada 30s`;

    } catch (err) {
      console.error(err);
      const msg = document.getElementById('loading-msg');
      if (msg) msg.textContent = '❌ Error al conectar con Google Sheets.';
    }
  }

  loadData();
  setInterval(loadData, REFRESH_MS);
</script>

</body>
</html>
