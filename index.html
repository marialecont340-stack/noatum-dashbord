<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Capacitación — Noatum</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      color: #fff;
      background-color: #0a0f1e;
      background-image: url('noatum-bg.png');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(5, 12, 35, 0.55);
      z-index: 0;
    }

    /* ── CONTENIDO — posicionado dentro del tablero ── */
    .page {
      position: absolute;
      z-index: 1;
      top: 6%;
      left: 50%;
      transform: translateX(-50%);
      width: 72%;
      max-height: 62vh;
      overflow-y: auto;
      padding: 1.5rem 1.75rem;
      scrollbar-width: none;
    }
    .page::-webkit-scrollbar { display: none; }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
      justify-content: center;
    }
    .brand-bar {
      width: 5px;
      height: 48px;
      background: #C8102E;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .brand-text {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 0;
    }
    .brand-text span {
      font-size: 1.6rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.06em;
    }
    .brand-sep {
      color: #C8102E;
      font-size: 1.6rem;
      font-weight: 300;
      margin: 0 10px;
    }
    .brand-dark { color: #fff; }
    .brand-red  { color: #C8102E; }
    .brand-underline { display: none; }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(34,197,94,0.15);
      border: 1px solid rgba(34,197,94,0.35);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.78rem;
      font-weight: 600;
      color: #4ade80;
      letter-spacing: 0.04em;
    }
    .live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.4; transform:scale(0.85); }
    }

    /* ── GRID DE ESCENARIOS ── */
    .scenarios-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }

    /* ── TARJETA DE ESCENARIO ── */
    .scenario-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 18px;
      overflow: hidden;
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
    }
    .scenario-header {
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.09);
    }
    .scenario-header .tag {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 3px;
    }
    .scenario-header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
    }

    .chart-area {
      padding: 0.75rem 1rem 0.25rem;
      position: relative;
      height: 100px;
    }

    /* ── PILLS DE VOTOS ── */
    .vote-pills {
      display: flex;
      gap: 8px;
      padding: 0 1.25rem 1rem;
      flex-wrap: wrap;
    }
    .pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .pill .dot { width:9px; height:9px; border-radius:50%; }
    .dot-a { background:#60a5fa; }
    .dot-b { background:#4ade80; }
    .dot-c { background:#fb923c; }
    .pill .pct { color: rgba(255,255,255,0.55); font-size:0.73rem; margin-left:2px; }

    .mayoria-badge {
      margin: 0 1.25rem 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #fde68a;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .mayoria-badge span { font-size:1rem; }

    /* ── INSIGHT ── */
    .insight-box {
      margin: 0 1.25rem 1.25rem;
      background: rgba(255,255,255,0.05);
      border-left: 3px solid #60a5fa;
      border-radius: 0 10px 10px 0;
      padding: 0.8rem 1rem;
      flex: 1;
    }
    .insight-box .insight-lbl {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #93c5fd;
      margin-bottom: 5px;
    }
    .insight-box p {
      font-size: 0.82rem;
      line-height: 1.55;
      color: rgba(255,255,255,0.82);
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.25);
    }

    /* ── LOADING / ERROR ── */
    .status-msg {
      text-align: center;
      padding: 3rem;
      color: rgba(255,255,255,0.5);
      font-size: 0.95rem;
    }

    @media (max-width: 600px) {
      .header-left h1 { font-size: 1.15rem; }
      .scenarios-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- HEADER -->
  <header>
    <div class="header-brand">
      <div class="brand-bar"></div>
      <div class="brand-text">
        <span class="brand-dark">RESULTADOS</span>
        <span class="brand-sep">|</span>
        <span class="brand-red">SIMULACIÓN</span>
        <span class="brand-sep">|</span>
        <span class="brand-dark">NOATUM</span>
      </div>
    </div>
    <div class="live-badge">
      <span class="live-dot"></span>EN VIVO
    </div>
  </header>

  <!-- ESCENARIOS -->
  <div class="scenarios-grid" id="scenarios-grid">
    <div class="status-msg" id="loading-msg">⏳ Conectando con Google Sheets...</div>
  </div>

  <footer id="footer-time"></footer>

</div>

<script>
  const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRmhc7rMhHxWRxlPvExnYe8-bgixqsq71eK3q_AbK1iQl3_rGwFa5Tta_cjbA96zB65FNly0bRFmFOQ/pub?gid=2001144107&single=true&output=csv';
  const REFRESH_MS = 30000;

  const charts = {};

  // ── Parser CSV robusto (maneja comas dentro de comillas) ──
  function parseCSV(text) {
    const rows = [];
    for (const line of text.split('\n')) {
      if (!line.trim()) continue;
      const cols = [];
      let inQ = false, col = '';
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { cols.push(col.trim()); col = ''; }
        else { col += ch; }
      }
      cols.push(col.trim());
      rows.push(cols);
    }
    return rows;
  }

  // ── Extraer número de strings como "50%" o "5" ──
  function num(v) {
    return parseFloat((v || '0').replace('%','').replace(',','.')) || 0;
  }

  // ── Crear o actualizar chart ──
  function renderChart(id, a, b, c) {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const data = {
      labels: ['Opción A', 'Opción B', 'Opción C'],
      datasets: [{
        data: [a, b, c],
        backgroundColor: ['rgba(96,165,250,0.75)', 'rgba(74,222,128,0.75)', 'rgba(251,146,60,0.75)'],
        borderColor:      ['#60a5fa','#4ade80','#fb923c'],
        borderWidth: 1.5,
        borderRadius: 5,
      }]
    };
    if (charts[id]) {
      charts[id].data.datasets[0].data = [a, b, c];
      charts[id].update('active');
    } else {
      charts[id] = new Chart(ctx, {
        type: 'bar',
        data,
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: ctx => ` ${ctx.raw} votos` } }
          },
          scales: {
            x: {
              ticks: { color: 'rgba(255,255,255,0.45)', font: { size: 11 } },
              grid:  { color: 'rgba(255,255,255,0.07)' },
              beginAtZero: true
            },
            y: {
              ticks: { color: 'rgba(255,255,255,0.7)', font: { size: 12, weight: '600' } },
              grid:  { display: false }
            }
          }
        }
      });
    }
  }

  // ── Render de los 3 escenarios ──
  function renderScenarios(scenRows) {
    const grid = document.getElementById('scenarios-grid');
    grid.innerHTML = '';

    scenRows.forEach((row, i) => {
      const nombre  = row[0] || `Escenario ${i+1}`;
      const vA      = num(row[1]);
      const vB      = num(row[2]);
      const vC      = num(row[3]);
      const total   = num(row[4]) || (vA + vB + vC);
      const pA      = row[5] || (total ? Math.round(vA/total*100)+'%' : '0%');
      const pB      = row[6] || (total ? Math.round(vB/total*100)+'%' : '0%');
      const pC      = row[7] || (total ? Math.round(vC/total*100)+'%' : '0%');
      const mayoria = row[8] || '—';
      const insight = row[9] || 'Insight pendiente...';
      const chartId = `chart-${i}`;

      const card = document.createElement('div');
      card.className = 'scenario-card';
      card.innerHTML = `
        <div class="scenario-header">
          <div class="tag">Escenario ${i+1}</div>
          <h2>${nombre}</h2>
        </div>
        <div class="chart-area">
          <canvas id="${chartId}" role="img" aria-label="Votos escenario ${i+1}"></canvas>
        </div>
        <div class="vote-pills">
          <span class="pill"><span class="dot dot-a"></span>A — ${vA} votos <span class="pct">(${pA})</span></span>
          <span class="pill"><span class="dot dot-b"></span>B — ${vB} votos <span class="pct">(${pB})</span></span>
          <span class="pill"><span class="dot dot-c"></span>C — ${vC} votos <span class="pct">(${pC})</span></span>
        </div>
        <div class="mayoria-badge"><span>🏆</span> Mayoría: Opción ${mayoria}</div>
        <div class="insight-box">
          <div class="insight-lbl">💡 Insight</div>
          <p>${insight}</p>
        </div>
      `;
      grid.appendChild(card);
      renderChart(chartId, vA, vB, vC);
    });
  }

  // ── Fetch y parseo principal ──
  async function loadData() {
    try {
      const res = await fetch(SHEET_URL + '&t=' + Date.now());
      const text = await res.text();
      const rows = parseCSV(text);

      // Buscar filas de escenarios (Escenario 1, Escenario 2, etc. — excluye encabezado)
      const scenRows = rows.filter(r => r[0] && /^escenario\s+\d+/i.test(r[0].trim()));

      if (!scenRows.length) {
        document.getElementById('loading-msg').textContent = '⚠️ No se encontraron datos de escenarios en el Sheet.';
        return;
      }

      // KPI total: buscar fila de totales o sumar
      let total = 0;
      const totRow = rows.find(r => r[0] && r[0].toLowerCase().includes('total'));
      if (totRow) {
        total = num(totRow[4]);
      } else {
        scenRows.forEach(r => { total = Math.max(total, num(r[4])); });
      }

      document.getElementById('subtitle').textContent =
        `Noatum · ${scenRows.length} escenarios activos`;

      renderScenarios(scenRows);

      const now = new Date();
      document.getElementById('footer-time').textContent =
        `Última actualización: ${now.toLocaleTimeString('es-PE')} · Se refresca automáticamente cada 30 segundos`;

    } catch (err) {
      console.error(err);
      const msg = document.getElementById('loading-msg');
      if (msg) msg.textContent = '❌ Error al conectar con Google Sheets. Verifica que el Sheet esté publicado.';
    }
  }

  // ── Iniciar y refrescar ──
  loadData();
  setInterval(loadData, REFRESH_MS);
</script>

</body>
</html>
